<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0C0C16">
<title>10BET v2 — Jackpot Simplifié</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0C0C16;overflow:hidden;}
#root{height:100%;display:flex;align-items:center;justify-content:center;}
@media(max-width:500px){
  #ph{width:100vw!important;height:100dvh!important;border-radius:0!important;border:none!important;}
  .phone-wrap{padding:0!important;background:transparent!important;}
  #root{align-items:flex-start;}
}
.phone-wrap{background:#1A1A2A;border-radius:28px;padding:16px;display:flex;}
#ph{width:390px;height:844px;background:#0C0C16;border-radius:44px;border:2px solid #252535;overflow:hidden;position:relative;font-family:'Barlow',-apple-system,sans-serif;color:#F0F0F8;-webkit-font-smoothing:antialiased;flex-shrink:0;}

/* ── SCREENS ── */
.scr{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;background:#0C0C16;display:none;}
.scr.on{display:block;}
.scr::-webkit-scrollbar{display:none;}

/* ── MATCH DETAIL SCREEN (slide from right) ── */
#scr-match{transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:block!important;}
#scr-match.on{transform:translateX(0);}

/* ── STATUS BAR ── */
.sbar{height:44px;display:flex;justify-content:space-between;align-items:center;padding:10px 20px 0;position:sticky;top:0;background:#0C0C16;z-index:20;}

/* ── BOTTOM NAV ── */
.bnav{position:absolute;bottom:0;left:0;right:0;height:72px;background:#0C0C16;border-top:1px solid #1E1E2E;display:flex;z-index:50;padding:8px 0 16px;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 0;}
.ni svg{width:20px;height:20px;fill:#6B6B80;transition:fill .2s;}
.ni-lbl{font-size:9px;font-family:'Exo 2',sans-serif;font-weight:600;color:#6B6B80;letter-spacing:.4px;transition:color .2s;}
.ni.ac svg{fill:#F5A623;}
.ni.ac .ni-lbl{color:#F5A623;}

/* ── TYPOGRAPHY ── */
.exo{font-family:'Exo 2',sans-serif;font-weight:900;}
.exo7{font-family:'Exo 2',sans-serif;font-weight:700;}

/* ── BUTTONS ── */
.btn{display:block;width:100%;padding:15px;border:none;border-radius:12px;cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:800;font-size:13px;letter-spacing:.4px;transition:transform .15s;user-select:none;text-align:center;}
.btn:active{transform:scale(.97);}
.btn-g{background:linear-gradient(135deg,#00D46A,#00A850);color:#000;}
.btn-o{background:linear-gradient(135deg,#F5A623,#E8860A);color:#000;}
.btn-ghost{background:#13131F;color:#F0F0F8;border:1px solid #252535;}

/* ── RED PARIER BUTTON ── */
.btn-parier{background:linear-gradient(135deg,#EF4444,#C01C1C);color:#fff;font-family:'Exo 2',sans-serif;font-weight:900;font-size:16px;letter-spacing:1.5px;border:none;border-radius:14px;padding:18px;cursor:pointer;transition:transform .15s,box-shadow .15s;display:block;width:100%;text-align:center;box-shadow:0 4px 20px rgba(239,68,68,.3);}
.btn-parier:active{transform:scale(.97);}
.btn-parier:disabled{opacity:.3;cursor:not-allowed;}
.btn-parier.ready{animation:pulseRed 2s ease infinite;}
@keyframes pulseRed{0%,100%{box-shadow:0 4px 20px rgba(239,68,68,.3);}50%{box-shadow:0 4px 32px rgba(239,68,68,.6);}}

/* ── CARDS ── */
.card{background:#13131F;border-radius:14px;border:1px solid #1E1E2E;padding:14px;}

/* ── MATCH CARD (home list) ── */
.mcard{background:#13131F;border:1px solid #1E1E2E;border-radius:14px;margin-bottom:8px;padding:12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.mcard:active{transform:scale(.98);}
.mcard.selected{border-color:#F5A623;background:#14142A;}
.mcard-live-bar{position:absolute;top:0;left:0;height:3px;background:linear-gradient(90deg,#EF4444,#F5A623);transition:width .5s ease;}

/* ── BIG SCENARIO OPTION BUTTONS ── */
.sopt{flex:1;padding:12px 6px;border-radius:10px;border:1.5px solid #252535;background:#1A1A2A;color:#6B6B80;font-family:'Exo 2',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s;text-align:center;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative;}
.sopt:active{transform:scale(.95);}
.sopt.sel-1x2{background:rgba(0,212,106,.15);border-color:#00D46A;color:#00D46A;}
.sopt.sel-dc{background:rgba(129,140,248,.15);border-color:#818CF8;color:#818CF8;}
.sopt.sel-bts{background:rgba(245,166,35,.15);border-color:#F5A623;color:#F5A623;}
.sopt.sel-ou{background:rgba(59,130,246,.15);border-color:#3B82F6;color:#3B82F6;}
.sopt.sel-ht{background:rgba(236,72,153,.15);border-color:#EC4899;color:#EC4899;}
.sopt.sel-score{background:rgba(16,185,129,.15);border-color:#10B981;color:#10B981;}
.market-block{margin-bottom:14px;background:#13131F;border:1px solid #1E1E2E;border-radius:12px;padding:12px;}

/* ── SELECTION DOTS (bigger) ── */
.dot{width:16px;height:16px;border-radius:50%;background:#1E1E2E;transition:all .25s;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid #2A2A3A;}
.dot.f{background:#00D46A;border-color:#00D46A;box-shadow:0 0 8px rgba(0,212,106,.5);}
.dot.f::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff;}

/* ── STAKE ROWS ── */
.stk{background:#13131F;border:1.5px solid #1E1E2E;border-radius:14px;padding:14px 12px;cursor:pointer;transition:all .2s;margin-bottom:8px;}
.stk.sel{border-color:#F5A623;background:rgba(245,166,35,.07);}
.stk:active{transform:scale(.98);}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-family:'Exo 2',sans-serif;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.bw{background:rgba(0,212,106,.12);color:#00D46A;border:1px solid rgba(0,212,106,.3);}
.bl{background:rgba(239,68,68,.12);color:#EF4444;border:1px solid rgba(239,68,68,.3);}
.bp{background:rgba(245,166,35,.12);color:#F5A623;border:1px solid rgba(245,166,35,.3);}
.blive{background:rgba(239,68,68,.15);color:#EF4444;border:1px solid rgba(239,68,68,.4);animation:pulseBadge 1.5s ease infinite;}
@keyframes pulseBadge{0%,100%{opacity:1;}50%{opacity:.6;}}

/* ── INPUTS ── */
.inp{width:100%;background:#13131F;border:1.5px solid #252535;border-radius:12px;padding:14px 16px;color:#F0F0F8;font-family:'Barlow',sans-serif;font-size:16px;outline:none;transition:border-color .2s;box-sizing:border-box;}
.inp:focus{border-color:#F5A623;}
.otp-inp{width:48px;height:58px;background:#13131F;border:1.5px solid #252535;border-radius:12px;color:#F0F0F8;font-family:'Exo 2',sans-serif;font-size:22px;font-weight:700;text-align:center;outline:none;transition:border-color .2s;}
.otp-inp:focus{border-color:#F5A623;}

/* ── DEPOSIT METHOD ── */
.dm{background:#13131F;border:1.5px solid #1E1E2E;border-radius:14px;padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;margin-bottom:10px;}
.dm.sel{border-color:#F5A623;background:rgba(245,166,35,.05);}
.dm:active{transform:scale(.98);}

/* ── CONFIRM BAR ── */
.cbar{position:sticky;bottom:72px;background:rgba(12,12,22,.97);border-top:1px solid #1E1E2E;padding:12px 16px;z-index:30;backdrop-filter:blur(8px);}

/* ── TAB BUTTONS ── */
.tab-btn{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid #1E1E2E;background:#13131F;color:#6B6B80;font-family:'Exo 2',sans-serif;font-weight:700;font-size:10px;cursor:pointer;transition:all .2s;}
.tab-btn.ac{border-color:#F5A623;background:rgba(245,166,35,.1);color:#F5A623;}

/* ── NOTIFICATION ── */
.notif{position:absolute;top:54px;left:14px;right:14px;background:#13131F;border:1.5px solid #00D46A;border-radius:12px;padding:12px 14px;z-index:100;display:flex;align-items:center;gap:10px;animation:slideDown .3s ease;}

/* ── MENU ITEMS ── */
.menu-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#13131F;border:1px solid #1E1E2E;border-radius:12px;margin-bottom:6px;cursor:pointer;transition:background .2s;}
.menu-item:active{background:#1A1A2A;}

/* ── TICKER ── */
.ticker-track{background:#F5A623;overflow:hidden;white-space:nowrap;padding:5px 0;}
.ticker-inner{display:inline-block;animation:ticker-scroll 22s linear infinite;font-family:'Exo 2',sans-serif;font-weight:700;font-size:10px;color:#000;letter-spacing:.5px;}

/* ── LIVE SCORE DISPLAY ── */
.live-score{background:#0F0F1A;border-radius:16px;padding:20px 16px;margin:12px 16px;border:1px solid #252535;position:relative;}
.score-display{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.team-col{flex:1;text-align:center;}
.score-col{flex:0 0 80px;text-align:center;}
.big-score{font-family:'Exo 2',sans-serif;font-weight:900;font-size:46px;color:#F0F0F8;line-height:1;}
.score-sep{font-family:'Exo 2',sans-serif;font-weight:900;font-size:30px;color:#3A3A4A;line-height:1;}
.minute-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:20px;padding:4px 10px;font-family:'Exo 2',sans-serif;font-weight:700;font-size:11px;color:#EF4444;}
.min-dot{width:7px;height:7px;border-radius:50%;background:#EF4444;animation:pulseBadge 1.2s ease infinite;}

/* ── MATCH EVENTS LOG ── */
.event-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(30,30,46,.5);}

/* ── ANIMATIONS ── */
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
@keyframes scaleIn{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes ticker-scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
@keyframes pulseGlow{0%,100%{opacity:1;}50%{opacity:.55;}}
@keyframes goalFlash{0%{background:rgba(245,166,35,.0);}30%{background:rgba(245,166,35,.2);}100%{background:rgba(245,166,35,.0);}}
.scale-in{animation:scaleIn .45s cubic-bezier(.34,1.56,.64,1) forwards;}
.spinning{animation:spin 1s linear infinite;}
.pulsing{animation:pulseGlow 2s ease infinite;}
.goal-flash{animation:goalFlash 1.5s ease forwards;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ══════════ DATA ══════════ */
const MATCHES_DEF = [
  {id:1, h:"PSG",        a:"Bayern Munich", lg:"Champions League", kickoff:0},
  {id:2, h:"Man City",   a:"Real Madrid",   lg:"Champions League", kickoff:12},
  {id:3, h:"Barcelona",  a:"Inter Milan",   lg:"Champions League", kickoff:5},
  {id:4, h:"Liverpool",  a:"Dortmund",      lg:"Champions League", kickoff:30},
  {id:5, h:"Atletico",   a:"Porto",         lg:"Champions League", kickoff:18},
  {id:6, h:"Arsenal",    a:"Napoli",        lg:"Europa League",    kickoff:45},
  {id:7, h:"Roma",       a:"Ajax",          lg:"Europa League",    kickoff:60},
  {id:8, h:"Juventus",   a:"Benfica",       lg:"Champions League", kickoff:22},
  {id:9, h:"Chelsea",    a:"Shakhtar",      lg:"Champions League", kickoff:8},
  {id:10,h:"AC Milan",   a:"PSV",           lg:"Champions League", kickoff:35},
  {id:11,h:"Leverkusen", a:"Celtic",        lg:"Champions League", kickoff:50},
  {id:12,h:"Séville",    a:"Man United",    lg:"Europa League",    kickoff:15},
];
const STAKES = [
  {a:100,g:15000,m:150},{a:200,g:25000,m:125},{a:500,g:50000,m:100},
  {a:1000,g:85000,m:85},{a:2000,g:150000,m:75},{a:5000,g:300000,m:60},{a:10000,g:500000,m:50},
];
const INIT_TICKETS = [
  {id:"TK-2025-001",date:"14 Mar",stake:500,gain:50000,status:"won",progress:10},
  {id:"TK-2025-002",date:"15 Mar",stake:1000,gain:85000,status:"lost",progress:10},
  {id:"TK-2025-003",date:"16 Mar",stake:200,gain:25000,status:"pending",progress:7},
];

/* ══════════ HELPERS ══════════ */
const fmt = n => n.toLocaleString("fr-FR");
const rnd = (min,max) => Math.floor(Math.random()*(max-min+1))+min;

/* ══════════ MARKETS BUILDER ══════════ */
function buildMarkets(ms) {
  const {hScore,aScore,minute} = ms;
  const total = hScore + aScore;
  const diff = hScore - aScore;
  const isLive = minute > 0;
  const late = minute > 70;
  return [
    {
      id:"1x2", label:"⚽ Résultat final", color:"sel-1x2",
      opts:[
        {k:"H", lbl: ms.homeName.split(" ")[0], sub:"Victoire dom."},
        {k:"N", lbl:"Nul", sub:"Match nul"},
        {k:"A", lbl: ms.awayName.split(" ")[0], sub:"Victoire ext."},
      ]
    },
    {
      id:"dc", label:"🔀 Double chance", color:"sel-dc",
      opts:[
        {k:"HN", lbl:"1 ou X", sub:"Dom. ou Nul"},
        {k:"HA", lbl:"1 ou 2", sub:"Dom. ou Ext."},
        {k:"NA", lbl:"X ou 2", sub:"Nul ou Ext."},
      ]
    },
    {
      id:"bts", label:"🥅 Les deux équipes marquent", color:"sel-bts",
      opts:[
        {k:"Y", lbl:"OUI", sub: isLive && hScore>0 && aScore>0 ? "✓ Déjà réalisé":isLive?"En attente":"—"},
        {k:"N_bts", lbl:"NON", sub: isLive && (hScore===0||aScore===0) ? "✓ Tient":"—"},
      ]
    },
    {
      id:"ou", label:`📊 Total buts — plus/moins 2.5`, color:"sel-ou",
      opts:[
        {k:"OV", lbl:"+ 2.5", sub: isLive ? `Actuel: ${total} but${total>1?"s":""}` : "Plus de 2 buts"},
        {k:"UN", lbl:"− 2.5", sub: isLive ? `Actuel: ${total} but${total>1?"s":""}` : "Moins de 3 buts"},
      ]
    },
    {
      id:"ht", label:"🕐 Résultat mi-temps", color:"sel-ht",
      opts:[
        {k:"HH", lbl: ms.homeName.split(" ")[0], sub:"Mène à la MT"},
        {k:"HN", lbl:"Nul", sub:"Égalité MT"},
        {k:"HA_ht", lbl: ms.awayName.split(" ")[0], sub:"Mène à la MT"},
      ]
    },
    {
      id:"score", label:"🎯 Score exact", color:"sel-score",
      opts:[
        {k:"10", lbl:"1 – 0", sub:"Dom. 1 à 0"},
        {k:"11", lbl:"1 – 1", sub:"Match nul"},
        {k:"20", lbl:"2 – 0", sub:"Dom. 2 à 0"},
        {k:"21", lbl:"2 – 1", sub:"Dom. 2 à 1"},
        {k:"00", lbl:"0 – 0", sub:"Blanc"},
        {k:"01", lbl:"0 – 1", sub:"Ext. 1 à 0"},
      ]
    },
  ];
}

/* ══════════ LOGO ══════════ */
function Logo({size=22}){
  return(
    <span className="exo" style={{fontSize:size,letterSpacing:"-.5px",lineHeight:1}}>
      <span style={{color:"#F5A623"}}>10</span>
      <span style={{color:"#F5A623",fontSize:size*.55,verticalAlign:"top"}}>★</span>
      <span style={{color:"#F0F0F8"}}>BET</span>
    </span>
  );
}

/* ══════════ STATUS BAR ══════════ */
function StatusBar({balance}){
  return(
    <div className="sbar">
      <span className="exo7" style={{fontSize:13}}>9:41</span>
      <Logo size={18}/>
      <div style={{display:"flex",alignItems:"baseline",gap:4,fontSize:12}}>
        <span className="exo7">{fmt(balance)}</span>
        <span style={{color:"#6B6B80",fontSize:10}}>FCFA</span>
      </div>
    </div>
  );
}

/* ══════════ BOTTOM NAV ══════════ */
function BottomNav({screen,onNav}){
  const items=[
    {id:"home",label:"Accueil",d:"M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"},
    {id:"paris",label:"Mes Paris",d:"M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"},
    {id:"depot",label:"Dépôt",d:"M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"},
    {id:"compte",label:"Compte",d:"M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"},
  ];
  const active=["mise","success"].includes(screen)?"home":screen;
  return(
    <div className="bnav">
      {items.map(n=>(
        <div key={n.id} className={`ni ${active===n.id?"ac":""}`} onClick={()=>onNav(n.id)}>
          <svg viewBox="0 0 24 24"><path d={n.d}/></svg>
          <span className="ni-lbl">{n.label}</span>
        </div>
      ))}
    </div>
  );
}

/* ══════════ SPLASH ══════════ */
function SplashScreen(){
  return(
    <div className="scr on" style={{display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:96,height:96,borderRadius:24,background:"#1A1A2A",border:"2px solid #F5A623",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}}>
          <span className="exo" style={{fontSize:38,color:"#F5A623"}}>10</span>
        </div>
        <Logo size={42}/>
        <div className="exo7" style={{fontSize:11,color:"#6B6B80",letterSpacing:2.5,textTransform:"uppercase",marginTop:8,marginBottom:52}}>JACKPOT SIMPLIFIÉ</div>
        <svg width="32" height="32" viewBox="0 0 32 32" className="spinning">
          <circle cx="16" cy="16" r="13" stroke="#252535" strokeWidth="3" fill="none"/>
          <path d="M 16 3 A 13 13 0 0 1 29 16" stroke="#F5A623" strokeWidth="3" strokeLinecap="round" fill="none"/>
        </svg>
      </div>
    </div>
  );
}

/* ══════════ LOGIN ══════════ */
function LoginScreen({phone,setPhone,onSendOtp}){
  const ok=phone.length>=8;
  return(
    <div className="scr on">
      <div style={{height:160,background:"#0F0F1A",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8}}>
        <Logo size={38}/><div className="exo7" style={{fontSize:10,color:"#6B6B80",letterSpacing:2.5,textTransform:"uppercase"}}>JACKPOT SIMPLIFIÉ</div>
      </div>
      <div style={{padding:24}}>
        <div style={{marginBottom:24}}><div className="exo" style={{fontSize:22,marginBottom:6}}>Bienvenue 👋</div><div style={{fontSize:14,color:"#6B6B80"}}>Entrez votre numéro pour commencer</div></div>
        <div style={{marginBottom:16}}>
          <div className="exo7" style={{fontSize:11,color:"#6B6B80",letterSpacing:1,marginBottom:8}}>NUMÉRO DE TÉLÉPHONE</div>
          <div style={{display:"flex",gap:8}}>
            <div style={{background:"#13131F",border:"1.5px solid #252535",borderRadius:12,padding:"14px 12px",fontSize:13,fontFamily:"'Exo 2',sans-serif",fontWeight:700,color:"#F5A623",whiteSpace:"nowrap"}}>🇨🇮 +225</div>
            <input className="inp" type="tel" placeholder="07 XX XX XX XX" value={phone} onChange={e=>setPhone(e.target.value)} maxLength={13} style={{flex:1}}/>
          </div>
        </div>

/* ══════════ OTP ══════════ */
function OtpScreen({phone,otp,setOtp,onVerify,onBack}){
  const refs=useRef([]);
  const allFilled=otp.every(v=>v!=="");
  const handleChange=(i,val)=>{
    if(!/^[0-9]?$/.test(val))return;
    const next=[...otp];next[i]=val;setOtp(next);
    if(val&&i<5&&refs.current[i+1])refs.current[i+1].focus();
  };
  const handleKeyDown=(i,e)=>{
    if(e.key==="Backspace"&&!otp[i]&&i>0&&refs.current[i-1])refs.current[i-1].focus();
  };
  return(
    <div className="scr on" style={{padding:24}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#6B6B80",fontSize:22,cursor:"pointer",marginBottom:16}}>←</button>
      <div className="exo" style={{fontSize:22,marginBottom:6}}>Vérification</div>
      <div style={{fontSize:14,color:"#6B6B80",marginBottom:32}}>Code envoyé au <span style={{color:"#F0F0F8",fontWeight:600}}>+225 {phone}</span></div>
      <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:32}}>
        {otp.map((v,i)=>(
          <input key={i} ref={el=>refs.current[i]=el} className="otp-inp" type="tel" maxLength={1} value={v} onChange={e=>handleChange(i,e.target.value)} onKeyDown={e=>handleKeyDown(i,e)}/>
        ))}
      </div>
      <button className="btn btn-o" style={{opacity:allFilled?1:.3}} onClick={()=>allFilled&&onVerify()}>Vérifier le code</button>
    </div>
  );
}

        <div style={{fontSize:12,color:"#6B6B80",marginBottom:16}}>Historique de vos tickets</div>
        <div style={{display:"flex",gap:6,marginBottom:16}}>
          {[{id:"all",l:"Tous"},{id:"pending",l:"En cours"},{id:"won",l:"Gagnés"},{id:"lost",l:"Perdus"}].map(f=>(
            <button key={f.id} className={`tab-btn ${filter===f.id?"ac":""}`} onClick={()=>setFilter(f.id)}>{f.l}</button>
          ))}
        </div>
        {filtered.map(t=>(
          <div key={t.id} className="card" style={{marginBottom:10,borderRadius:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div><div className="exo7" style={{fontSize:12,color:"#6B6B80"}}>{t.date}</div></div>
              <span className={`badge ${sMap[t.status]}`}>{sLabel[t.status]}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,borderTop:"1px solid #1E1E2E",paddingTop:10}}>
              <div><div className="exo7" style={{fontSize:10,color:"#6B6B80",marginBottom:3}}>MISE</div><div className="exo7" style={{fontSize:16}}>{fmt(t.stake)} <span style={{fontSize:10,color:"#6B6B80"}}>F</span></div></div>
              <div><div className="exo7" style={{fontSize:10,color:"#6B6B80",marginBottom:3}}>{t.status==="won"?"GAGNÉ":"POTENTIEL"}</div><div className="exo7" style={{fontSize:16,color:t.status==="won"?"#00D46A":"#F5A623"}}>{fmt(t.gain)} <span style={{fontSize:10}}>F</span></div></div>
            </div>
            {t.status==="pending"&&(
              <div style={{marginTop:10,background:"#0C0C16",borderRadius:8,padding:10,border:"1px solid #1E1E2E"}}>
                <div className="exo7" style={{fontSize:10,color:"#6B6B80",marginBottom:5}}>PROGRESSION</div>
                <div style={{display:"flex",gap:3,marginBottom:5}}>
                  {Array(10).fill(0).map((_,i)=>(
                    <div key={i} style={{flex:1,height:5,borderRadius:3,background:i<t.progress?"#F5A623":"#1E1E2E"}}/>
                  ))}
                </div>
                <div className="exo7 pulsing" style={{fontSize:11,color:"#F5A623"}}>{t.progress}/10</div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════ DEPOT ══════════ */
function DepotScreen({balance,notif,onDeposit}){

  const [method,setMethod]=useState("wave");
  const amt=parseInt(amount);
  const canPay=!isNaN(amt)&&amt>=100;
  const methods=[
    {id:"wave",label:"Wave",sub:"Instantané",bg:"#0033AA",abbr:"W",tc:"#fff"},
    {id:"orange",label:"Orange Money",sub:"24h/24",bg:"#FF6200",abbr:"OM",tc:"#fff"},
    {id:"mtn",label:"MTN MoMo",sub:"Mobile Money",bg:"#FFD600",abbr:"MTN",tc:"#000"},
  ];
  return(
    <div className="scr on" style={{paddingBottom:80}}>
      <StatusBar balance={balance}/>
      {notif&&(<div className="notif"><div style={{width:32,height:32,borderRadius:"50%",background:"rgba(0,212,106,.15)",display:"flex",alignItems:"center",justifyContent:"center",color:"#00D46A",fontSize:18,flexShrink:0}}>✓</div><div><div className="exo7" style={{fontSize:13,color:"#00D46A"}}>Dépôt confirmé !</div><div style={{fontSize:11,color:"#6B6B80"}}>{notif}</div></div></div>)}
      <div style={{padding:16}}>
        <div className="exo" style={{fontSize:22,marginBottom:4}}>Dépôt</div>
        <div style={{fontSize:12,color:"#6B6B80",marginBottom:16}}>Rechargez votre portefeuille</div>
        <div className="card" style={{marginBottom:20,background:"#0F0F1A",borderColor:"#252535"}}>
          <div className="exo7" style={{fontSize:11,color:"#6B6B80",letterSpacing:.8,marginBottom:4}}>SOLDE ACTUEL</div>
          <div style={{display:"flex",alignItems:"baseline",gap:6}}><span className="exo" style={{fontSize:32}}>{fmt(balance)}</span><span style={{fontSize:14,color:"#6B6B80"}}>FCFA</span></div>
        </div>
        <div style={{marginBottom:16}}>
          <div className="exo7" style={{fontSize:11,color:"#6B6B80",letterSpacing:.8,marginBottom:8}}>MONTANT (FCFA)</div>
          <input className="inp" type="number" placeholder="Ex: 5 000" value={amount} onChange={e=>setAmount(e.target.value)}/>
          <div style={{display:"flex",gap:6,marginTop:8}}>
            {[1000,2000,5000,10000].map(a=>(
              <button key={a} onClick={()=>setAmount(String(a))} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1px solid ${amount===String(a)?"#F5A623":"#252535"}`,background:amount===String(a)?"rgba(245,166,35,.1)":"#13131F",color:amount===String(a)?"#F5A623":"#F0F0F8",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:11,cursor:"pointer"}}>
                {fmt(a)}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div className="exo7" style={{fontSize:11,color:"#6B6B80",letterSpacing:.8,marginBottom:10}}>MÉTHODE</div>
          {methods.map(m=>(
            <div key={m.id} className={`dm ${method===m.id?"sel":""}`} onClick={()=>setMethod(m.id)}>
              <div style={{width:40,height:40,borderRadius:12,background:m.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,fontFamily:"'Exo 2',sans-serif",color:m.tc,flexShrink:0}}>{m.abbr}</div>
              <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{m.label}</div><div style={{fontSize:11,color:"#6B6B80"}}>{m.sub}</div></div>
              {method===m.id&&<div className="exo7" style={{color:"#F5A623"}}>✓</div>}
            </div>
          ))}
        </div>
        <button className="btn btn-o" style={{opacity:canPay?1:.3}} onClick={()=>canPay&&onDeposit(amt)}>DÉPOSER MAINTENANT</button>
      </div>
    </div>
  );
}

/* ══════════ ROOT APP ══════════ */
function App(){
  const [screen, setScreen] = useState("splash");
  const [phone,  setPhone]  = useState("");
  const [otp,    setOtp]    = useState(["","","","","",""]);
  const [selections,    setSelections]    = useState({});
  const [selectedStake, setSelectedStake] = useState(null);
  const [balance,       setBalance]       = useState(12500);
  const [tickets,       setTickets]       = useState(INIT_TICKETS);
  const [ticketFilter,  setTicketFilter]  = useState("all");
  const [successTicket, setSuccessTicket] = useState(null);
  const [depotNotif,    setDepotNotif]    = useState(null);
  const [activeMatch,   setActiveMatch]   = useState(null); // match id for detail screen

  /* ── LIVE MATCH STATES ── */
  const initStates = () => {
    const s = {};
    MATCHES_DEF.forEach(m=>{
      const ko = m.kickoff;
      s[m.id] = {
        minute:   ko,
        hScore:   0,
        aScore:   0,
        posHome:  rnd(40,60),
        posAway:  0,
        shotsHome: rnd(0,3),
        shotsAway: rnd(0,3),
        cornersHome: rnd(0,4),
        cornersAway: rnd(0,4),
        events: [],
      };
      s[m.id].posAway = 100 - s[m.id].posHome;
    });
    return s;
  };
  const [matchStates, setMatchStates] = useState(initStates);

  /* ── SIMULATION TICK (every 3 seconds = ~1 minute of match time) ── */
  useEffect(()=>{
    if(!["home","match"].includes(screen) && screen !== "home") return;
    const tick = setInterval(()=>{
      setMatchStates(prev=>{
        const next = {...prev};
        MATCHES_DEF.forEach(m=>{
          const st = {...next[m.id]};
          if(st.minute >= 90) return;
          st.minute = Math.min(st.minute + 1, 90);
          // Random goal every ~12 ticks (low probability)
          if(Math.random() < 0.065) {
            const isHome = Math.random() > 0.45;
            if(isHome) st.hScore++;
            else st.aScore++;
            const names = isHome
              ? ["Mbappé","Messi","Vitinha","Dembélé","Neymar","Hakimi"]
              : ["Kane","Sané","Müller","Gnabry","Coman","Musiala"];
            const team = isHome ? m.h : m.a;
            const player = names[rnd(0,names.length-1)];
            st.events = [...(st.events||[]), {min: st.minute, type:"goal", team, player}];
            st.shotsHome += isHome ? rnd(1,2) : 0;
            st.shotsAway += !isHome ? rnd(1,2) : 0;
          }
          // random shot
          if(Math.random() < 0.15) {
            if(Math.random()>.5) st.shotsHome++;
            else st.shotsAway++;
          }
          // random corner
          if(Math.random() < 0.08) {
            if(Math.random()>.5) st.cornersHome++;
            else st.cornersAway++;
          }
          // possession drift
          const drift = rnd(-2,2);
          st.posHome = Math.max(35, Math.min(65, st.posHome + drift));
          st.posAway = 100 - st.posHome;
          next[m.id] = st;
        });
        return next;
      });
    }, 2800);
    return ()=>clearInterval(tick);
  }, [screen]);

  useEffect(()=>{
    if(screen==="splash"){const t=setTimeout(()=>setScreen("login"),2300);return()=>clearTimeout(t);}
  },[screen]);
  useEffect(()=>{
    if(screen==="otp"){const t=setTimeout(()=>setOtp(["4","8","3","2","1","7"]),1400);return()=>clearTimeout(t);}
  },[screen]);
  useEffect(()=>{
    if(depotNotif){const t=setTimeout(()=>setDepotNotif(null),3200);return()=>clearTimeout(t);}
  },[depotNotif]);

  const handleMatchClick = (matchId) => {
    setActiveMatch(matchId);
    setScreen("match");
  };

  const handleParier = (matchId, sel) => {
    setSelections(prev => ({...prev, [matchId]: sel}));
    setScreen("home");
    setActiveMatch(null);
  };

  const validateTicket = () => {
    if(!selectedStake) return;
    const newT={id:"TK-"+Date.now().toString().slice(-4),date:"16 Mar",stake:selectedStake.a,gain:selectedStake.g,status:"pending",progress:2};
    setSuccessTicket(newT);
    setTickets(prev=>[newT,...prev]);
    setBalance(prev=>prev-selectedStake.a);
    setSelections({});
    setSelectedStake(null);
    setScreen("success");
  };

  const handleDeposit = (amt) => {
    setBalance(prev=>prev+amt);
    setDepotNotif("+"+fmt(amt)+" FCFA ajoutés");
  };

  const mainScreens = ["home","paris","depot","compte"];
  const go = s => { setActiveMatch(null); setScreen(s); };

  const activeMatchDef = activeMatch ? MATCHES_DEF.find(m=>m.id===activeMatch) : null;
  const activeMatchState = activeMatch ? matchStates[activeMatch] : null;

  return(
    <div className="phone-wrap">
      <div id="ph">
        {screen==="splash"  && <SplashScreen/>}
        {screen==="login"   && <LoginScreen phone={phone} setPhone={setPhone} onSendOtp={()=>setScreen("otp")}/>}
        {screen==="otp"     && <OtpScreen phone={phone} otp={otp} setOtp={setOtp} onVerify={()=>setScreen("home")} onBack={()=>setScreen("login")}/>}
        {screen==="home"    && <HomeScreen balance={balance} selections={selections} matchStates={matchStates} onMatchClick={handleMatchClick} onClear={()=>setSelections({})} onConfirm={()=>setScreen("mise")}/>}
        {screen==="mise"    && <MiseScreen balance={balance} selectedStake={selectedStake} setSelectedStake={setSelectedStake} onClose={()=>setScreen("home")} onValidate={validateTicket}/>}
        {screen==="success" && <SuccessScreen ticket={successTicket} onViewBets={()=>setScreen("paris")} onNewBet={()=>{setSelections({});setScreen("home");}}/>}
        {screen==="paris"   && <MesParis balance={balance} tickets={tickets} filter={ticketFilter} setFilter={setTicketFilter}/>}
        {screen==="depot"   && <DepotScreen balance={balance} notif={depotNotif} onDeposit={handleDeposit}/>}
        {screen==="compte"  && <CompteScreen balance={balance} tickets={tickets}/>}
        {mainScreens.includes(screen) && <BottomNav screen={screen} onNav={go}/>}

        {/* Match detail overlay */}
        {activeMatchDef && activeMatchState && (
          <MatchDetail
            match={activeMatchDef}
            matchState={activeMatchState}
            currentSel={selections[activeMatch] || null}
            onBack={()=>{setScreen("home");setActiveMatch(null);}}
            onParier={handleParier}
          />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
